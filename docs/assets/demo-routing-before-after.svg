<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workflow Skill Router before and after routing demo</title>
  <desc id="desc">A before and after comparison showing a noisy AI agent skill list becoming a focused route with one primary skill and supporting skills.</desc>
  <rect width="1200" height="675" rx="24" fill="#08111F"/>
  <rect x="34" y="34" width="1132" height="607" rx="18" fill="#F7FBFF"/>
  <rect x="34" y="34" width="1132" height="88" rx="18" fill="#0D1826"/>
  <circle cx="84" cy="78" r="15" fill="#0891B2"/>
  <circle cx="128" cy="78" r="15" fill="#84CC16"/>
  <circle cx="172" cy="78" r="15" fill="#F59E0B"/>
  <text x="600" y="91" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Workflow Skill Router</text>
  <text x="600" y="164" text-anchor="middle" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Turn broad agent context into a small, reviewable skill route</text>

  <rect x="74" y="205" width="500" height="358" rx="14" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>
  <text x="104" y="252" fill="#9A3412" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Before: noisy skill pile</text>
  <text x="104" y="292" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">One frontend bug wakes every related workflow.</text>
  <g font-family="Consolas, Menlo, monospace" font-size="19" font-weight="700">
    <rect x="104" y="326" width="118" height="42" rx="9" fill="#FFEDD5"/>
    <text x="124" y="353" fill="#9A3412">frontend</text>
    <rect x="240" y="326" width="64" height="42" rx="9" fill="#FFEDD5"/>
    <text x="260" y="353" fill="#9A3412">ui</text>
    <rect x="322" y="326" width="112" height="42" rx="9" fill="#FFEDD5"/>
    <text x="342" y="353" fill="#9A3412">browser</text>
    <rect x="104" y="385" width="132" height="42" rx="9" fill="#FFEDD5"/>
    <text x="124" y="412" fill="#9A3412">playwright</text>
    <rect x="254" y="385" width="64" height="42" rx="9" fill="#FFEDD5"/>
    <text x="274" y="412" fill="#9A3412">qa</text>
    <rect x="336" y="385" width="168" height="42" rx="9" fill="#FFEDD5"/>
    <text x="356" y="412" fill="#9A3412">design-system</text>
    <rect x="104" y="444" width="96" height="42" rx="9" fill="#FFEDD5"/>
    <text x="124" y="471" fill="#9A3412">github</text>
    <rect x="218" y="444" width="78" height="42" rx="9" fill="#FFEDD5"/>
    <text x="238" y="471" fill="#9A3412">docs</text>
    <rect x="314" y="444" width="146" height="42" rx="9" fill="#FFEDD5"/>
    <text x="334" y="471" fill="#9A3412">deployment</text>
  </g>
  <text x="104" y="528" fill="#9A3412" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Result: too much context, unclear owner, weak verification.</text>

  <path d="M608 384H684" stroke="#0891B2" stroke-width="8" stroke-linecap="round"/>
  <path d="M668 361L696 384L668 407" stroke="#0891B2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="726" y="205" width="400" height="358" rx="14" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="2"/>
  <text x="756" y="252" fill="#155E75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">After: focused route</text>
  <text x="756" y="292" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">One primary skill leads; support stays small.</text>
  <rect x="756" y="324" width="340" height="178" rx="12" fill="#08111F"/>
  <text x="782" y="363" fill="#A5F3FC" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700">Route: Frontend / Vue / UI</text>
  <text x="782" y="402" fill="#F8FAFC" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700">Primary: vue-expert</text>
  <text x="782" y="441" fill="#D9F99D" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700">Support: systematic-debugging</text>
  <text x="782" y="474" fill="#D9F99D" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700">Support: playwright</text>
  <text x="756" y="528" fill="#155E75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Result: clear owner, causal debugging, repeatable regression check.</text>
</svg>
