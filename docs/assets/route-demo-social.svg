<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workflow Skill Router social demo</title>
  <desc id="desc">A fuzzy request becomes a small routing output with one primary skill and focused supporting skills.</desc>
  <rect width="1200" height="630" fill="#08111f"/>
  <rect x="64" y="64" width="1072" height="502" rx="24" fill="#f8fafc"/>
  <text x="104" y="132" fill="#08111f" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Workflow Skill Router</text>
  <text x="104" y="176" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Fuzzy request -> small, reviewable skill set</text>

  <g>
    <rect x="104" y="224" width="420" height="238" rx="16" fill="#e2e8f0"/>
    <text x="132" y="272" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">User request</text>
    <text x="132" y="326" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="23">Fix a Vue form that</text>
    <text x="132" y="362" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="23">loses selected values</text>
    <text x="132" y="398" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="23">after refresh.</text>
  </g>

  <g>
    <path d="M560 342H654" stroke="#0891b2" stroke-width="10" stroke-linecap="round"/>
    <path d="M650 314L690 342L650 370" stroke="#0891b2" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.4s" repeatCount="indefinite"/>
  </g>

  <g>
    <rect x="720" y="224" width="376" height="238" rx="16" fill="#08111f"/>
    <text x="748" y="272" fill="#84cc16" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Route</text>
    <text x="748" y="316" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20">Frontend / Vue / UI</text>
    <text x="748" y="356" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20">Use SKILL:</text>
    <text x="748" y="394" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="20">vue-expert</text>
    <text x="748" y="426" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="20">systematic-debugging</text>
    <text x="748" y="458" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="20">playwright</text>
  </g>
</svg>
