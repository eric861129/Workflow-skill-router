name: Example request
description: Request or propose a new company-style router example.
title: "[Example]: "
labels: ["example", "needs-triage"]
body:
  - type: input
    id: domain
    attributes:
      label: Domain
      description: Example domain, such as revenue operations, internal admin, customer portal, CI, or data analytics.
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: Describe the workflow and the kinds of skills that overlap.
    validations:
      required: true
  - type: textarea
    id: sample-prompts
    attributes:
      label: Sample prompts
      description: Provide 2-3 prompts that should trigger this example.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I used company-style placeholders and removed private identifiers.
          required: true

