name: Plugin / MCP runtime bug
description: Report a reproducible failure in the V2 Plugin, MCP server, bundled runtime, or bridge.
title: "[Runtime bug]: "
labels: ["plugin", "runtime", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Remove credentials, private prompts, internal paths, SQLite state, and personal data before submitting. Use private vulnerability reporting for security impact.
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2, macOS 15, or Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex version
      placeholder: Output of the relevant Codex version command
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: 2.0.0-beta.1
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: 3.11.x
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 24.x
    validations:
      required: true
  - type: dropdown
    id: install-mode
    attributes:
      label: Install mode
      options:
        - Plugin from a release archive
        - Plugin from source
        - SKILL-only package
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest public-safe sequence that reproduces the failure.
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: sanitized-logs
    attributes:
      label: Sanitized logs
      description: Include bounded logs only after removing secrets, prompts, local paths, and personal data.
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and security check
      options:
        - label: I removed credentials, private prompts, internal paths, SQLite state, and personal data.
          required: true
        - label: This report does not disclose a vulnerability that belongs in private vulnerability reporting.
          required: true
