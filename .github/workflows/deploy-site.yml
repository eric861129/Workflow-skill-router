name: Deploy Starlight site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          path: site
          node-version: 24
          package-manager: npm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke test public HTTPS URL
        run: |
          curl -fsS --head --max-time 20 https://huangchiyu.com/Workflow-skill-router/
          final_url="$(curl -fsS -I -L --max-time 20 -o /dev/null -w '%{url_effective}' http://huangchiyu.com/Workflow-skill-router/)"
          case "$final_url" in
            https://huangchiyu.com/Workflow-skill-router/*) ;;
            *)
              echo "Expected HTTP to resolve to the HTTPS project path, got: $final_url"
              exit 1
              ;;
          esac

