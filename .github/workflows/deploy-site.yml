name: Deploy Starlight site to GitHub Pages

on:
  workflow_run:
    workflows: ["Validate V2 contracts"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Install, build, and upload site
        uses: withastro/action@e84f40bd8d2caa9e768ec82ad30dd81f0b280853 # v6.1.2
        with:
          path: site
          node-version: 24
          package-manager: npm@11.6.2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Smoke test public HTTPS URL
        run: |
          curl -fsS --head --max-time 20 https://huangchiyu.com/Workflow-skill-router/
          final_url="$(curl -fsS -I -L --max-time 20 -o /dev/null -w '%{url_effective}' http://huangchiyu.com/Workflow-skill-router/)"
          case "$final_url" in
            https://huangchiyu.com/Workflow-skill-router/*) ;;
            *)
              echo "Expected HTTP to resolve to the HTTPS project path, got: $final_url"
              exit 1
              ;;
          esac
