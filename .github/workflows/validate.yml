name: Validate V2 contracts

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-artifacts:
    name: Deterministic artifacts (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugins/workflow-skill-router/package-lock.json
      - name: Check deterministic source-built artifacts
        run: python scripts/build-release-artifacts.py --check
      - name: Test release and installation contracts
        run: python -m unittest tests/test_release_artifacts.py tests/test_installation_smoke.py -v
      - name: Check deterministic Plugin runtime
        run: python plugins/workflow-skill-router/scripts/build-runtime.py --check
      - name: Test Router Core
        env:
          PYTHONPATH: packages/router-core/src
        run: python -m unittest discover -s packages/router-core/tests -p "test_*.py" -v
      - name: Install Plugin/MCP dependencies
        working-directory: plugins/workflow-skill-router
        run: npm ci
      - name: Type-check and test Plugin/MCP
        working-directory: plugins/workflow-skill-router
        run: npm run check

  validate:
    name: Core, documentation, and policy contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            site/package-lock.json
            plugins/workflow-skill-router/package-lock.json
      - name: Validate V2 standalone SKILL
        run: python scripts/validate-router.py starter/v2/workflow-skill-router
      - name: Audit public readiness
        run: python scripts/validate-router.py --public-readiness .
      - name: Run dedicated public-readiness audit
        run: python scripts/audit-public-readiness.py .
      - name: Check Markdown links
        run: python scripts/check-markdown-links.py .
      - name: Install plugin build dependencies
        working-directory: plugins/workflow-skill-router
        run: npm ci
      - name: Run repository unit tests
        run: python -m unittest discover -s tests
      - name: Check generated V2 demo data
        run: python scripts/build-v2-demo-data.py --check
      - name: Check generated MCP reference data
        run: node scripts/build-mcp-reference-data.mjs --check
      - name: Build documentation site
        working-directory: site
        run: |
          npm ci
          npm run assets:demo:check
          npm run assets:social:check
          npm run build
      - name: Install Playwright Chromium
        working-directory: site
        run: npx playwright install --with-deps chromium
      - name: Run documentation site smoke tests
        working-directory: site
        run: npm run test:site:smoke

  site-visual:
    name: Site visual regression
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: site
        run: npx playwright install chromium
      - name: Run documentation site visual regression tests
        working-directory: site
        run: npm run test:site:visual

  required-v2:
    name: Required cross-platform V2 gate
    if: ${{ always() }}
    needs: [release-artifacts, validate, site-visual]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every V2 dependency to succeed
        shell: python
        env:
          RELEASE_ARTIFACTS_RESULT: ${{ needs.release-artifacts.result }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          SITE_VISUAL_RESULT: ${{ needs.site-visual.result }}
        run: |
          import os

          results = {
              "release-artifacts": os.environ["RELEASE_ARTIFACTS_RESULT"],
              "validate": os.environ["VALIDATE_RESULT"],
              "site-visual": os.environ["SITE_VISUAL_RESULT"],
          }
          failed = {name: result for name, result in results.items() if result != 'success'}
          if failed:
              raise SystemExit(f"Required V2 dependencies did not all succeed: {failed}")

  build-pages:
    name: Build validated Pages artifact
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: required-v2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout validated main revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install, build, and upload site
        uses: withastro/action@e84f40bd8d2caa9e768ec82ad30dd81f0b280853 # v6.1.2
        with:
          path: site
          node-version: 24
          package-manager: npm@11.6.2

  deploy-pages:
    name: Deploy validated site to GitHub Pages
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build-pages
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Smoke test public HTTPS URL
        shell: bash
        run: |
          curl -fsS --head --max-time 20 https://huangchiyu.com/Workflow-skill-router/
          final_url="$(curl -fsS -I -L --max-time 20 -o /dev/null -w '%{url_effective}' http://huangchiyu.com/Workflow-skill-router/)"
          case "$final_url" in
            https://huangchiyu.com/Workflow-skill-router/*) ;;
            *)
              echo "Expected HTTP to resolve to the HTTPS project path, got: $final_url"
              exit 1
              ;;
          esac
