name: Validate router tools

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Validate starter router
        run: python scripts/validate-router.py starter/workflow-skill-router

      - name: Audit public readiness
        run: python scripts/validate-router.py --public-readiness .

      - name: Run dedicated public-readiness audit
        run: python scripts/audit-public-readiness.py .

      - name: Check markdown local links
        run: python scripts/check-markdown-links.py .

      - name: Scan sample skills
        run: >
          python scripts/scan-skills.py ./sample-skills
          --out /tmp/skill-index.json
          --markdown /tmp/skill-index.md
          --warnings /tmp/skill-warnings.md
          --suggest-tree /tmp/suggested-skill-tree.md
          --fail-on-private
          --fail-on-duplicates

      - name: Evaluate routing examples
        run: >
          python scripts/evaluate-routing.py
          --scenarios evaluation/scenarios.example.jsonl
          --predictions evaluation/predictions.example.jsonl
          --report /tmp/routing-report.md
          --json-report /tmp/routing-report.json
          --fail-on-violations
          --strict

      - name: Validate route cases
        run: python scripts/validate-route-cases.py route-cases

      - name: Check generated route gallery data
        run: python scripts/build-route-gallery.py --check

      - name: Check routing metrics trend data
        run: python scripts/render-routing-metrics-trend.py --check

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Smoke test release assets
        run: >
          python scripts/smoke-release-assets.py
          --downloads-dir downloads
          --work-dir "$RUNNER_TEMP/wsr-release-smoke-${{ github.run_id }}"

      - name: Build documentation site
        working-directory: site
        run: |
          npm ci
          npm run assets:demo:check
          npm run assets:social:check
          npm run build

      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Run documentation site smoke tests
        working-directory: site
        run: npm run test:site:smoke

  site-visual:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: site
        run: npx playwright install chromium

      - name: Run documentation site visual regression tests
        working-directory: site
        run: npm run test:site:visual
