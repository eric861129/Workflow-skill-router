name: Validate router tools

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate starter router
        run: python scripts/validate-router.py starter/workflow-skill-router

      - name: Audit public readiness
        run: python scripts/validate-router.py --public-readiness .

      - name: Scan sample skills
        run: >
          python scripts/scan-skills.py ./sample-skills
          --out /tmp/skill-index.json
          --markdown /tmp/skill-index.md
          --warnings /tmp/skill-warnings.md
          --suggest-tree /tmp/suggested-skill-tree.md

      - name: Evaluate routing examples
        run: >
          python scripts/evaluate-routing.py
          --scenarios evaluation/scenarios.example.jsonl
          --predictions evaluation/predictions.example.jsonl
          --report /tmp/routing-report.md
          --json-report /tmp/routing-report.json
          --fail-on-violations

      - name: Run unit tests
        run: python -m unittest discover -s tests
