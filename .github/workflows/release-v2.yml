name: Release V2

on:
  workflow_dispatch:
    inputs:
      confirm_release:
        description: Type CREATE_V2_RELEASE to build, tag, attest, and publish the frozen release source.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-v2
  cancel-in-progress: false

jobs:
  resolve-source:
    name: Resolve frozen V2 release source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_revision: ${{ steps.source.outputs.source_revision }}
      release_tag: ${{ steps.source.outputs.release_tag }}
    steps:
      - name: Verify trusted release dispatch
        shell: python
        env:
          GITHUB_REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CONFIRM_RELEASE: ${{ inputs.confirm_release }}
        run: |
          import os

          expected_ref = f"refs/heads/{os.environ['DEFAULT_BRANCH']}"
          if (
              os.environ["GITHUB_REF"] != expected_ref
              or os.environ["CONFIRM_RELEASE"] != "CREATE_V2_RELEASE"
          ):
              raise SystemExit(
                  "Dispatch must run from the default branch with explicit confirmation."
              )
      - name: Checkout trusted release contract
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Enforce trusted publication lifecycle
        id: source
        shell: bash
        env:
          TRUSTED_METADATA_REVISION: ${{ github.sha }}
        run: >-
          python scripts/release-publication-gate.py
          --metadata release/version.json
          --trusted-revision "$TRUSTED_METADATA_REVISION"
          --github-output "$GITHUB_OUTPUT"
      - name: Verify declared frozen release source
        shell: python
        env:
          DECLARED_REVISION: ${{ steps.source.outputs.source_revision }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
        run: |
          import os
          import subprocess

          declared_revision = os.environ["DECLARED_REVISION"]
          release_tag = os.environ["RELEASE_TAG"]

          try:
              subprocess.run(
                  ["git", "cat-file", "-e", f"{declared_revision}^{{commit}}"],
                  check=True,
              )
              subprocess.run(
                  ["git", "merge-base", "--is-ancestor", declared_revision, "HEAD"],
                  check=True,
              )
          except subprocess.CalledProcessError as error:
              raise SystemExit(
                  "Declared release source is not a reachable trusted revision."
              ) from error

          tag_ref = f"refs/tags/{release_tag}"
          remote_output = subprocess.check_output(
              ["git", "ls-remote", "origin", tag_ref, f"{tag_ref}^{{}}"],
              text=True,
          )
          remote_refs = {}
          for line in remote_output.splitlines():
              revision, reference = line.split("\t", 1)
              if reference not in {tag_ref, f"{tag_ref}^{{}}"} or reference in remote_refs:
                  raise SystemExit("Existing release tag could not be verified.")
              remote_refs[reference] = revision

          if remote_refs:
              if tag_ref not in remote_refs:
                  raise SystemExit("Existing release tag could not be verified.")
              remote_source_revision = remote_refs.get(f"{tag_ref}^{{}}", remote_refs[tag_ref])
              if remote_source_revision != declared_revision:
                  raise SystemExit(
                      "Existing release tag does not match declared release source revision."
                  )

  preflight:
    name: V2 preflight (${{ matrix.os }})
    needs: resolve-source
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout frozen release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-source.outputs.source_revision }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugins/workflow-skill-router/package-lock.json
      - name: Verify exact frozen source revision
        shell: python
        env:
          EXPECTED_SOURCE_REVISION: ${{ needs.resolve-source.outputs.source_revision }}
        run: |
          import os
          import subprocess

          actual = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          expected = os.environ["EXPECTED_SOURCE_REVISION"]
          if actual != expected:
              raise SystemExit(
                  f"Checked out revision {actual!r} does not match declared release source revision {expected!r}."
              )
      - name: Check deterministic source-built artifacts
        run: python -I -S -B scripts/build-release-artifacts.py --check
      - name: Test release and extracted installation contracts
        run: python -m unittest tests/test_release_artifacts.py tests/test_installation_smoke.py -v
      - name: Check deterministic Plugin runtime
        run: python plugins/workflow-skill-router/scripts/build-runtime.py --check
      - name: Test Router Core
        env:
          PYTHONPATH: packages/router-core/src
        run: python -m unittest discover -s packages/router-core/tests -p "test_*.py" -v
      - name: Install Plugin/MCP dependencies
        working-directory: plugins/workflow-skill-router
        run: npm ci
      - name: Type-check and test Plugin/MCP
        working-directory: plugins/workflow-skill-router
        run: npm run check

  release:
    name: Build, attest, and publish V2
    needs: [resolve-source, preflight]
    runs-on: ubuntu-latest
    env:
      SOURCE_REVISION: ${{ needs.resolve-source.outputs.source_revision }}
      RELEASE_TAG: ${{ needs.resolve-source.outputs.release_tag }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout frozen release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-source.outputs.source_revision }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            plugins/workflow-skill-router/package-lock.json
            site/package-lock.json
      - name: Verify frozen source revision
        shell: python
        run: |
          import os
          import subprocess

          actual_revision = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          expected_revision = os.environ["SOURCE_REVISION"]
          if actual_revision != expected_revision:
              raise SystemExit(
                  f"checked out revision {actual_revision!r} does not match "
                  f"declared release source revision {expected_revision!r}"
              )
      - name: Install Plugin/MCP dependencies
        working-directory: plugins/workflow-skill-router
        run: npm ci
      - name: Test repository contracts
        run: python -m unittest discover -s tests
      - name: Build documentation
        working-directory: site
        run: npm ci && npm run assets:demo:check && npm run assets:social:check && npm run build
      - name: Build deterministic release assets from source
        run: >-
          python -I -S -B scripts/build-release-artifacts.py
          --output-dir dist/release
          --provenance-mode release
          --source-revision "$SOURCE_REVISION"
          --require-clean
          --check-determinism
      - name: Verify generated checksums and SBOM
        shell: bash
        run: |
          test -s "dist/release/sbom/workflow-skill-router-v${RELEASE_TAG#v}.spdx.json"
          (cd dist/release && sha256sum --check checksums.sha256)
      - name: Mint scoped release App token
        id: release-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.WSR_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.WSR_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
      - name: Create or verify immutable release tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          fail_tag_check() {
            echo "Release tag could not be verified against the declared release source revision."
            exit 1
          }

          remote_refs="$(git ls-remote origin "refs/tags/$RELEASE_TAG" "refs/tags/$RELEASE_TAG^{}")" \
            || fail_tag_check
          if [[ -z "$remote_refs" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" "$SOURCE_REVISION" -m "Workflow Skill Router $RELEASE_TAG"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "refs/tags/$RELEASE_TAG" || fail_tag_check
            remote_refs="$(git ls-remote origin "refs/tags/$RELEASE_TAG" "refs/tags/$RELEASE_TAG^{}")" \
              || fail_tag_check
          fi
          direct_revision=""
          peeled_revision=""
          while IFS=$'\t' read -r revision reference; do
            if [[ -z "$revision" && -z "$reference" ]]; then
              continue
            fi
            case "$reference" in
              "refs/tags/$RELEASE_TAG")
                [[ -z "$direct_revision" ]] || fail_tag_check
                direct_revision="$revision"
                ;;
              "refs/tags/$RELEASE_TAG^{}")
                [[ -z "$peeled_revision" ]] || fail_tag_check
                peeled_revision="$revision"
                ;;
              *)
                fail_tag_check
                ;;
            esac
          done <<< "$remote_refs"

          [[ -n "$direct_revision" ]] || fail_tag_check
          remote_source_revision="${peeled_revision:-$direct_revision}"
          if [[ "$remote_source_revision" != "$SOURCE_REVISION" ]]; then
            fail_tag_check
          fi
      - name: Attest release assets from checksums
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/release/checksums.sha256
      - name: Upload release bundle for workflow review
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workflow-skill-router-${{ env.RELEASE_TAG }}
          path: dist/release/
          if-no-files-found: error
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          mapfile -t release_files < <(find dist/release -type f -print | sort)
          release_flags=()
          if [[ "$RELEASE_TAG" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$RELEASE_TAG" "${release_files[@]}" \
            --verify-tag \
            --title "Workflow Skill Router $RELEASE_TAG" \
            --notes-file "release/notes/${RELEASE_TAG}.md" \
            "${release_flags[@]}"

  publish-plugin-distribution:
    name: Publish verified standalone Plugin repository
    needs: [resolve-source, preflight, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: plugin-distribution-release
      cancel-in-progress: false
    env:
      SOURCE_REVISION: ${{ needs.resolve-source.outputs.source_revision }}
      RELEASE_TAG: ${{ needs.resolve-source.outputs.release_tag }}
      TARGET_REPOSITORY: eric861129/workflow-skill-router-plugin
      TARGET_BRANCH: main
      TARGET_SCANNER_WORKFLOW: "HOL Plugin Scanner"
      TARGET_TAG_PATTERN: "v*"
    steps:
      - name: Checkout frozen release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-source.outputs.source_revision }}
          fetch-depth: 0
          persist-credentials: false
      - name: Mint least-privilege target App token
        id: target-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.WSR_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.WSR_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: workflow-skill-router-plugin
          permission-actions: read
          permission-contents: write
      - name: Build standalone Plugin distribution
        shell: bash
        run: |
          python -I -S -B scripts/build-plugin-distribution-repo.py \
            --output-dir "$RUNNER_TEMP/plugin-distribution" \
            --source-revision "$SOURCE_REVISION" \
            --version "${RELEASE_TAG#v}" \
            --check-determinism
      - name: Checkout target main branch
        shell: bash
        env:
          GH_TOKEN: ${{ steps.target-app-token.outputs.token }}
        run: |
          gh repo clone "$TARGET_REPOSITORY" "$RUNNER_TEMP/plugin-target" -- \
            --branch "$TARGET_BRANCH" \
            --single-branch
      - name: Synchronize and publish target main branch
        id: publish-target
        shell: bash
        env:
          GH_TOKEN: ${{ steps.target-app-token.outputs.token }}
        run: |
          python -I -S -B scripts/sync-plugin-distribution-repo.py \
            --generated-root "$RUNNER_TEMP/plugin-distribution" \
            --target-root "$RUNNER_TEMP/plugin-target" \
            --expected-remote "https://github.com/${TARGET_REPOSITORY}.git"

          cd "$RUNNER_TEMP/plugin-target"
          git add --all
          if git diff --cached --quiet; then
            echo "Generated Plugin distribution already matches target main."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "release: publish Workflow Skill Router $RELEASE_TAG"
            gh auth setup-git
            git push origin HEAD:main
          fi

          TARGET_REVISION="$(git rev-parse HEAD)"
          REMOTE_MAIN_REVISION="$(
            git ls-remote --exit-code origin "refs/heads/$TARGET_BRANCH" |
              awk 'NR == 1 { print $1 }'
          )"
          if [[ -z "$REMOTE_MAIN_REVISION" || "$REMOTE_MAIN_REVISION" != "$TARGET_REVISION" ]]; then
            echo "Target main does not resolve to the generated Plugin revision."
            exit 1
          fi
          echo "target_revision=$TARGET_REVISION" >> "$GITHUB_OUTPUT"
      - name: Wait for target HOL Plugin Scanner
        shell: bash
        env:
          GH_TOKEN: ${{ steps.target-app-token.outputs.token }}
          TARGET_REVISION: ${{ steps.publish-target.outputs.target_revision }}
        run: |
          SCANNER_RUN_ID=""
          for attempt in $(seq 1 30); do
            SCANNER_RUN_ID="$(
              gh run list \
                --repo "$TARGET_REPOSITORY" \
                --workflow "$TARGET_SCANNER_WORKFLOW" \
                --commit "$TARGET_REVISION" \
                --limit 20 \
                --json databaseId,headSha \
                --jq "map(select(.headSha == \"$TARGET_REVISION\")) | first | .databaseId // empty"
            )"
            if [[ -n "$SCANNER_RUN_ID" ]]; then
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              echo "No HOL Plugin Scanner run was found for target revision $TARGET_REVISION."
              exit 1
            fi
            sleep 10
          done

          gh run watch "$SCANNER_RUN_ID" \
            --repo "$TARGET_REPOSITORY" \
            --exit-status
          SCANNER_HEAD_SHA="$(
            gh run view "$SCANNER_RUN_ID" \
              --repo "$TARGET_REPOSITORY" \
              --json headSha \
              --jq .headSha
          )"
          if [[ "$SCANNER_HEAD_SHA" != "$TARGET_REVISION" ]]; then
            echo "HOL Plugin Scanner did not verify the exact target revision."
            exit 1
          fi
      - name: Create or verify target release tag
        shell: bash
        env:
          GH_TOKEN: ${{ steps.target-app-token.outputs.token }}
          TARGET_REVISION: ${{ steps.publish-target.outputs.target_revision }}
        run: |
          case "$RELEASE_TAG" in
            $TARGET_TAG_PATTERN) ;;
            *)
              echo "Target release tag does not match $TARGET_TAG_PATTERN."
              exit 1
              ;;
          esac

          cd "$RUNNER_TEMP/plugin-target"
          fail_target_tag_check() {
            echo "Target release tag could not be verified against the scanned target revision."
            exit 1
          }

          REMOTE_REFS="$(
            git ls-remote origin \
              "refs/tags/$RELEASE_TAG" \
              "refs/tags/$RELEASE_TAG^{}"
          )" || fail_target_tag_check
          if [[ -z "$REMOTE_REFS" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" "$TARGET_REVISION" \
              -m "Workflow Skill Router Plugin $RELEASE_TAG"
            gh auth setup-git
            git push origin "refs/tags/$RELEASE_TAG" || fail_target_tag_check
            REMOTE_REFS="$(
              git ls-remote origin \
                "refs/tags/$RELEASE_TAG" \
                "refs/tags/$RELEASE_TAG^{}"
            )" || fail_target_tag_check
          fi

          DIRECT_REVISION=""
          PEELED_REVISION=""
          while IFS=$'\t' read -r revision reference; do
            if [[ -z "$revision" && -z "$reference" ]]; then
              continue
            fi
            case "$reference" in
              "refs/tags/$RELEASE_TAG")
                [[ -z "$DIRECT_REVISION" ]] || fail_target_tag_check
                DIRECT_REVISION="$revision"
                ;;
              "refs/tags/$RELEASE_TAG^{}")
                [[ -z "$PEELED_REVISION" ]] || fail_target_tag_check
                PEELED_REVISION="$revision"
                ;;
              *)
                fail_target_tag_check
                ;;
            esac
          done <<< "$REMOTE_REFS"

          [[ -n "$DIRECT_REVISION" ]] || fail_target_tag_check
          REMOTE_TARGET_REVISION="${PEELED_REVISION:-$DIRECT_REVISION}"
          if [[ "$REMOTE_TARGET_REVISION" != "$TARGET_REVISION" ]]; then
            fail_target_tag_check
          fi
